{% extends "layouts/auth.html" %}

{% block title %}登录 - 元策{% endblock %}

{% block content %}
<section class="auth-panel">
  <div class="auth-hero" aria-label="元策产品介绍">
    <div class="auth-brand">
      <img class="brand-mark" src="/static/brand/yuance-logo.svg" alt="" width="32" height="32">
      <div>
        <strong>元策</strong>
        <span>企业级项目管理系统</span>
      </div>
    </div>
    <div class="auth-visual auth-visual-workspace" aria-hidden="true">
      <div class="visual-shell">
        <div class="visual-toolbar">
          <div class="visual-window-bar">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="visual-search-pill">
            <i></i>
            <span></span>
          </div>
          <div class="visual-user-chip">策</div>
        </div>

        <div class="visual-workspace-grid">
          <div class="visual-side-rail">
            <span class="active"></span>
            <span></span>
            <span></span>
            <span></span>
          </div>

          <div class="visual-workspace-main">
            <div class="visual-project-card">
              <div class="visual-project-icon">元</div>
              <div>
                <strong>元策 V1.0</strong>
                <span>项目工作台</span>
              </div>
              <em>72%</em>
            </div>

            <div class="visual-metrics">
              <span><b></b><i></i></span>
              <span><b></b><i></i></span>
              <span><b></b><i></i></span>
            </div>

            <div class="visual-board">
              <div class="visual-column">
                <strong>需求</strong>
                <span class="visual-ticket visual-ticket-accent">
                  <i></i>
                  <b></b>
                  <em></em>
                </span>
                <span class="visual-line visual-line-lg"></span>
                <span class="visual-line visual-line-sm"></span>
              </div>
              <div class="visual-column">
                <strong>任务</strong>
                <span class="visual-line visual-line-md"></span>
                <span class="visual-ticket visual-ticket-dark">
                  <i></i>
                  <b></b>
                  <em></em>
                </span>
                <span class="visual-line visual-line-sm"></span>
              </div>
              <div class="visual-column">
                <strong>缺陷</strong>
                <span class="visual-line visual-line-md"></span>
                <span class="visual-ticket visual-ticket-soft">
                  <i></i>
                  <b></b>
                  <em></em>
                </span>
                <span class="visual-line visual-line-lg"></span>
              </div>
            </div>

            <div class="visual-timeline">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <form class="auth-form" method="post" action="/web/login">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <div class="form-head">
      <span class="form-eyebrow">Welcome back</span>
      <h1>登录元策</h1>
      <p>继续进入你的项目工作台。</p>
    </div>
    {% if error_message != "" %}
    <div class="auth-message auth-message-error" role="alert">
      {{ error_message }}
    </div>
    {% endif %}
    <label>
      <span>用户名</span>
      <input name="username" autocomplete="username" placeholder="yuance_admin">
    </label>
    <label>
      <span>密码</span>
      <input name="password" type="password" autocomplete="current-password" placeholder="请输入密码">
    </label>
    <button class="btn btn-primary btn-block" type="submit">登录</button>
    <div class="auth-form-footer">
      <span>首次部署？</span>
      <a class="text-link" href="/web/bootstrap">初始化系统管理员</a>
    </div>
  </form>

  <div class="auth-foot">
    <span class="env-badge">{{ environment }}</span>
    <span>统一入口 /web</span>
  </div>
</section>
{% endblock %}
