{% extends "layouts/web.html" %}

{% block title %}系统管理 - 元策{% endblock %}

{% block content %}
<section class="system-grid">
  <a class="system-card" href="/web/system/users">
    <strong>用户管理</strong>
    <span>账号、状态、角色绑定、重置密码。</span>
  </a>
  <a class="system-card" href="/web/system/roles">
    <strong>角色权限</strong>
    <span>系统角色、权限点、角色授权。</span>
  </a>
  <a class="system-card" href="/web/system/storage">
    <strong>对象存储</strong>
    <span>阿里云 OSS 配置、探测和签名能力。</span>
  </a>
  {% if system_nav.database_stats %}
  <a class="system-card" href="/web/system/database-stats">
    <strong>数据库统计</strong>
    <span>按需刷新查看所有表设计、表备注和数据量。</span>
  </a>
  {% endif %}
  <a class="system-card" href="/web/system/audit">
    <strong>审计日志</strong>
    <span>登录、授权、配置变更和高风险操作。</span>
  </a>
</section>
{% endblock %}
