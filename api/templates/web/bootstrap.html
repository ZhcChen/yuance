{% extends "layouts/auth.html" %}

{% block title %}初始化系统管理员 - 元策{% endblock %}

{% block content %}
<section class="auth-panel auth-panel-wide">
  <div class="auth-hero" aria-label="初始化说明">
    <div class="auth-brand">
      <img class="brand-mark" src="/static/brand/yuance-logo.svg" alt="" width="32" height="32">
      <div>
        <strong>初始化元策</strong>
        <span>正式环境首次启动</span>
      </div>
    </div>
    <div class="auth-visual auth-visual-setup" aria-hidden="true">
      <div class="setup-console">
        <div class="setup-console-head">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="setup-core">
          <i></i>
          <strong>Owner</strong>
          <span>首个管理员</span>
        </div>
        <div class="setup-node setup-node-db">
          <b></b>
          <span>SQLite</span>
        </div>
        <div class="setup-node setup-node-oss">
          <b></b>
          <span>OSS</span>
        </div>
        <div class="setup-node setup-node-rbac">
          <b></b>
          <span>RBAC</span>
        </div>
        <div class="setup-rail setup-rail-db"></div>
        <div class="setup-rail setup-rail-oss"></div>
        <div class="setup-rail setup-rail-rbac"></div>
        <div class="setup-side setup-side-left">
          <b></b>
          <span></span>
          <span></span>
        </div>
        <div class="setup-side setup-side-right">
          <b></b>
          <span></span>
          <span></span>
        </div>
      </div>
      <div class="setup-steps">
        <span class="active"><i></i>迁移</span>
        <span><i></i>账号</span>
        <span><i></i>启用</span>
      </div>
    </div>
  </div>

  <form class="auth-form" method="post" action="/web/bootstrap/init" hx-post="/web/bootstrap/init" hx-target="#bootstrap-result" hx-swap="innerHTML">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <div class="form-head">
      <span class="form-eyebrow">System owner</span>
      <h1>创建系统管理员</h1>
      <p>请使用一个长期可控的管理员账号完成初始化。</p>
    </div>
    <div class="field-grid">
      <label>
        <span>用户名</span>
        <input name="username" autocomplete="username" placeholder="admin">
      </label>
      <label>
        <span>显示名称</span>
        <input name="display_name" autocomplete="name" placeholder="系统管理员">
      </label>
      <label>
        <span>密码</span>
        <input name="password" type="password" autocomplete="new-password" placeholder="至少 10 位">
      </label>
      <label>
        <span>确认密码</span>
        <input name="password_confirm" type="password" autocomplete="new-password" placeholder="再次输入密码">
      </label>
    </div>
    <button class="btn btn-primary btn-block" type="submit">创建并进入系统</button>
    <div id="bootstrap-result" class="inline-result" aria-live="polite"></div>
  </form>

  <div class="auth-foot">
    <span class="env-badge">{{ environment }}</span>
    <a class="text-link" href="/web/login">返回登录</a>
  </div>
</section>
{% endblock %}
