<div class="rich-text-toolbar" aria-label="富文本工具栏">
  <button type="button" data-rich-command="bold" aria-label="加粗"><strong>B</strong></button>
  <button type="button" data-rich-command="italic" aria-label="斜体"><em>I</em></button>
  <button type="button" data-rich-command="insertUnorderedList" aria-label="无序列表">•</button>
  <button type="button" data-rich-command="insertCodeBlock" aria-label="插入代码块"><span aria-hidden="true">&lt;/&gt;</span></button>
  <button type="button" data-rich-command="createLink" aria-label="插入链接">链接</button>
  <button type="button" data-rich-command="convertMarkdown" aria-label="转换 Markdown">MD</button>
  <button type="button" data-rich-command="justifyLeft" aria-label="左对齐">左</button>
  <button type="button" data-rich-command="justifyCenter" aria-label="居中对齐">中</button>
  <button type="button" data-rich-command="justifyRight" aria-label="右对齐">右</button>
</div>
