<label>每页<select name="per_page" data-pagination-size>{% if pagination.per_page != 10 && pagination.per_page != 20 && pagination.per_page != 50 && pagination.per_page != 100 %}<option value="{{ pagination.per_page }}" selected>当前 {{ pagination.per_page }}</option>{% endif %}<option value="10" {% if pagination.per_page == 10 %}selected{% endif %}>10</option><option value="20" {% if pagination.per_page == 20 %}selected{% endif %}>20</option><option value="50" {% if pagination.per_page == 50 %}selected{% endif %}>50</option><option value="100" {% if pagination.per_page == 100 %}selected{% endif %}>100</option></select></label>
<label>跳至<input name="page" type="number" min="1" max="{{ pagination.total_pages }}" value="{{ pagination.page }}" inputmode="numeric" aria-label="跳转页码"></label>
<button class="btn btn-sm btn-secondary" type="submit">跳转</button>
