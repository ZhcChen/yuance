<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}元策{% endblock %}</title>
  <meta name="yuance-csrf-token" content="{{ csrf_token }}">
  <link rel="icon" href="/favicon.ico" type="image/svg+xml">
  <link rel="alternate icon" href="/static/brand/yuance-logo.svg" type="image/svg+xml">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("yuance-theme") === "dark" ? "dark" : "light";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      } catch (_error) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body class="auth-body" data-page-transition>
  <main class="auth-shell">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
