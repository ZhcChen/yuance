<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}元策{% endblock %}</title>
  <meta name="yuance-csrf-token" content="{{ csrf_token }}">
  <link rel="icon" href="/favicon.ico" type="image/svg+xml">
  <link rel="alternate icon" href="/static/brand/yuance-logo.svg" type="image/svg+xml">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("yuance-theme") === "dark" ? "dark" : "light";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      } catch (_error) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body class="auth-body" data-page-transition>
  <main class="auth-shell">
    {% block content %}{% endblock %}
  </main>
  <div class="toast-region" data-toast-region aria-live="polite" aria-atomic="false"></div>
  <aside id="app-update-modal" class="modal app-update-modal" data-modal data-app-update-modal hidden aria-hidden="true">
    <div class="modal-backdrop" data-modal-close></div>
    <section class="modal-panel modal-confirm" role="dialog" aria-modal="true" aria-labelledby="app-update-title" tabindex="-1">
      <div class="modal-head">
        <div class="app-update-copy">
          <h2 id="app-update-title">发现新版本</h2>
          <p>系统已发布新版本。刷新后可继续使用最新功能。</p>
        </div>
        <button class="icon-btn" type="button" data-modal-close aria-label="稍后处理">×</button>
      </div>
      <div class="app-update-meta" aria-label="版本信息">
        <div class="app-update-meta-item">
          <span>当前版本</span>
          <strong data-app-update-current>--</strong>
        </div>
        <div class="app-update-meta-item">
          <span>最新版本</span>
          <strong data-app-update-next>--</strong>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" type="button" data-app-update-later data-modal-close>稍后刷新</button>
        <button class="btn btn-primary" type="button" data-app-update-refresh>立即刷新</button>
      </div>
    </section>
  </aside>
</body>
</html>
